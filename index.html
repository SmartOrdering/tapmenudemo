let lang = 'bg';
let openCards = new Set();

function t(item, bg_key, en_key) { return lang === 'bg' ? item[bg_key] : item[en_key]; }

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function buildMenu() {
  const main = document.getElementById('menu-main');
  const navInner = document.getElementById('nav-inner');
  main.innerHTML = '';
  navInner.innerHTML = '';

  menuData.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat.id;
    btn.textContent = lang === 'bg' ? cat.bg : cat.en;
    btn.onclick = () => document.getElementById('section-' + cat.id).scrollIntoView({ behavior:'smooth', block:'start' });
    navInner.appendChild(btn);

    const sec = document.createElement('section');
    sec.className = 'cat-section reveal';
    sec.id = 'section-' + cat.id;

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<h2 class="cat-title">${lang === 'bg' ? cat.bg : cat.en}</h2><div class="cat-divider"></div>`;
    sec.appendChild(header);

    if (cat.special) {
      const ds = document.createElement('div');
      ds.className = 'dishes-list';
      ds.innerHTML = `<div class="dessert-special"><p class="ds-main">${lang==='bg'?cat.special_bg:cat.special_en}</p><p class="ds-sub">🍮 🍰 🍫</p></div>`;
      sec.appendChild(ds);
    } else {
      const list = document.createElement('div');
      list.className = 'dishes-list';

      cat.dishes.forEach((dish, idx) => {
        const cardId = `${cat.id}-${idx}`;
        dishRegistry[cardId] = dish;

        let priceHtml = '';
        if (dish.price_half && dish.price_full) {
          priceHtml = `<div class="dish-price"><span class="price-half">${dish.price_half} /</span> ${dish.price_full} лв.</div>`;
        } else if (dish.price_note_bg) {
          priceHtml = `<div class="dish-price" style="font-size:11px;color:var(--text-muted)">${lang==='bg'?dish.price_note_bg:dish.price_note_en}</div>`;
        }

        const shortIng = lang === 'bg' ? dish.bg_ing : dish.en_ing;
        const allergenHtml = dish.allergens.length > 0
          ? dish.allergens.map(a => `<span class="allergen-tag">${ALLERGEN_ICONS[a][`label_${lang}`]} ${ALLERGEN_ICONS[a].bg}</span>`).join('')
          : `<span style="font-size:12px;color:var(--text-muted)">${lang==='bg'?'Без алергени':'No allergens'}</span>`;

        const card = document.createElement('div');
        card.className = 'dish-card' + (openCards.has(cardId) ? ' open' : '');
        card.dataset.id = cardId;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-expanded', openCards.has(cardId) ? 'true' : 'false');
        card.innerHTML = `
          <div class="dish-left">
            <div class="dish-name">${lang==='bg'?dish.bg_name:dish.en_name}</div>
            <div class="dish-short">${shortIng}</div>
          </div>
          <div class="dish-right">${priceHtml}</div>
          <svg class="dish-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;

        const expand = document.createElement('div');
        expand.className = 'dish-expand' + (openCards.has(cardId) ? ' open' : '');
        expand.id = 'expand-' + cardId;
        expand.innerHTML = `
          <div class="dish-expand-inner">
            <div class="expand-section">
              <span class="expand-label">${lang==='bg'?'Съставки':'Ingredients'}</span>
              <p class="expand-text">${lang==='bg'?dish.bg_ing:dish.en_ing}</p>
            </div>
            <div class="expand-section">
              <span class="expand-label">${lang==='bg'?'Алергени':'Allergens'}</span>
              <div class="allergen-list">${allergenHtml}</div>
            </div>
            ${dish.price_full ? `
            <div class="expand-section">
              <button class="add-to-cart-btn" onclick="event.stopPropagation();addToCart('${cardId}')">
                + ${lang==='bg'?'Добави':'Add to cart'}
              </button>
            </div>` : ''}
          </div>`;

        card.addEventListener('click', () => toggleCard(cardId, card, expand));
        list.appendChild(card);
        list.appendChild(expand);
      });
      sec.appendChild(list);
    }

    const sep = document.createElement('div');
    sep.className = 'section-sep';
    sep.innerHTML = '<div class="sep-line"></div><span class="sep-icon">✦</span><div class="sep-line"></div>';
    sec.appendChild(sep);
    main.appendChild(sec);
  });

  updateStaticText();
  initObservers();
}

function toggleCard(id, card, expand) {
  if (openCards.has(id)) {
    openCards.delete(id);
    card.classList.remove('open');
    expand.classList.remove('open');
    card.setAttribute('aria-expanded', 'false');
  } else {
    openCards.add(id);
    card.classList.add('open');
    expand.classList.add('open');
    card.setAttribute('aria-expanded', 'true');
  }
}

function updateStaticText() {
  const isBg = lang === 'bg';
  document.getElementById('slogan').textContent = isBg ? 'Място, където вкусът среща страстта!' : 'Where taste meets passion!';
  document.getElementById('scroll-label').textContent = isBg ? 'Виж менюто' : 'View Menu';
  document.getElementById('lang-label').textContent = isBg ? 'EN' : 'BG';
  document.getElementById('footer-tagline').textContent = isBg ? 'Домашна храна, приготвена с любов!' : 'Home food, made with love!';
  document.getElementById('fp1').textContent = isBg ? 'Свежи продукти' : 'Fresh Ingredients';
  document.getElementById('fp2').textContent = isBg ? 'Истински вкус' : 'Authentic Taste';
  document.getElementById('fp3').textContent = isBg ? 'Топло посрещане' : 'Warm Hospitality';
  document.documentElement.lang = isBg ? 'bg' : 'en';
}

function toggleLang() {
  lang = lang === 'bg' ? 'en' : 'bg';
  buildMenu();
}

function initObservers() {
  const revealObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
  }, { threshold: 0.05 });
  document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

  const navBtns = document.querySelectorAll('.cat-btn');
  const navObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('section-', '');
        navBtns.forEach(b => b.classList.toggle('active', b.dataset.cat === id));
        const activeBtn = document.querySelector(`.cat-btn[data-cat="${id}"]`);
        if (activeBtn) activeBtn.scrollIntoView({ inline:'nearest', behavior:'smooth' });
      }
    });
  }, { rootMargin:'-40% 0px -55% 0px', threshold: 0 });
  document.querySelectorAll('.cat-section').forEach(s => navObs.observe(s));
}

let cart = [];
const dishRegistry = {};

function addToCart(cardId) {
  const dish = dishRegistry[cardId];
  if (!dish) return;
  const name = lang === 'bg' ? dish.bg_name : dish.en_name;
  const price = parseFloat(dish.price_full) || 0;
  const existing = cart.find(i => i.id === cardId);
  if (existing) { existing.qty++; }
  else { cart.push({ id: cardId, name, price, qty: 1 }); }
  updateCartUI();
  const bubble = document.getElementById('cartBubble');
  bubble.classList.remove('bump');
  void bubble.offsetWidth;
  bubble.classList.add('bump');
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  updateCartUI();
  renderCartItems();
}

function updateCartUI() {
  const totalQty = cart.reduce((s, i) => s + i.qty, 0);
  const bubble = document.getElementById('cartBubble');
  document.getElementById('cartCount').textContent = totalQty;
  if (totalQty > 0) bubble.classList.add('visible');
  else { bubble.classList.remove('visible'); closeCart(); }
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const totalEl = document.getElementById('cartTotalPrice');
  if (totalEl) totalEl.innerHTML = `${total.toFixed(2)} лв. <span style="font-size:14px;color:var(--text-muted)">(${(total/1.95583).toFixed(2)} €)</span>`;
  const footer = document.getElementById('cartFooter');
  const empty  = document.getElementById('cartEmpty');
  if (footer) footer.style.display = cart.length > 0 ? 'block' : 'none';
  if (empty)  empty.style.display  = cart.length === 0 ? 'block' : 'none';
}

function renderCartItems() {
  const container = document.getElementById('cartItems');
  container.innerHTML = '';
  if (cart.length === 0) {
    container.innerHTML = `<div class="cart-empty" id="cartEmpty">${lang==='bg'?'Количката е празна':'Your cart is empty'}</div>`;
    return;
  }
  cart.forEach(item => {
    const el = document.createElement('div');
    el.className = 'cart-item';
    el.innerHTML = `
      <div class="cart-item-name">${item.name}</div>
      <div class="cart-qty">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
      </div>
      <div class="cart-item-price">${(item.price*item.qty).toFixed(2)} лв.<br><span style="font-size:11px;color:var(--text-muted)">${((item.price*item.qty)/1.95583).toFixed(2)} €</span></div>`;
    container.appendChild(el);
  });
  const empty = document.createElement('div');
  empty.className = 'cart-empty'; empty.id = 'cartEmpty'; empty.style.display = 'none';
  empty.textContent = lang === 'bg' ? 'Количката е празна' : 'Your cart is empty';
  container.appendChild(empty);
}

function openCart()  { renderCartItems(); updateCartUI(); updateCartLabels(); document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartDrawer').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartDrawer').classList.remove('open'); document.body.style.overflow = ''; }

function updateCartLabels() {
  const isBg = lang === 'bg';
  const el = id => document.getElementById(id);
  if (el('cartBubbleLabel')) el('cartBubbleLabel').textContent = isBg ? 'Количка' : 'Cart';
  if (el('cartTitleLabel'))  el('cartTitleLabel').textContent  = isBg ? 'Количка' : 'Cart';
  if (el('cartTotalLabel'))  el('cartTotalLabel').textContent  = isBg ? 'Общо'    : 'Total';
  if (el('tableLabel'))      el('tableLabel').textContent      = isBg ? 'Маса №'  : 'Table No.';
  if (el('tableNumber'))     el('tableNumber').placeholder     = isBg ? 'напр. 5' : 'e.g. 5';
  if (el('noteLabel'))       el('noteLabel').textContent       = isBg ? 'Бележка' : 'Note';
  if (el('cartNoteText'))    el('cartNoteText').placeholder    = isBg ? 'Специални желания...' : 'Special requests...';
  if (el('sendOrderLabel'))  el('sendOrderLabel').textContent  = isBg ? 'Изпрати поръчката' : 'Send Order';
}

async function sendOrder() {
  if (cart.length === 0) return;
  const table = document.getElementById('tableNumber').value.trim();
  const note  = document.getElementById('cartNoteText').value.trim();
  const isBg  = lang === 'bg';

  if (!table) {
    const input = document.getElementById('tableNumber');
    input.style.borderColor = 'var(--orange)';
    input.placeholder = isBg ? '⚠️ Въведи номер на маса!' : '⚠️ Enter table number!';
    input.focus();
    setTimeout(() => { input.style.borderColor = ''; input.placeholder = isBg ? 'напр. 5' : 'e.g. 5'; }, 3000);
    return;
  }

  let orderLines = '';
  cart.forEach(item => {
    const lineTotal = item.price * item.qty;
    orderLines += `• ${item.name} x${item.qty} — ${lineTotal.toFixed(2)} лв. (${(lineTotal/1.95583).toFixed(2)} €)\n`;
  });
  const total    = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const totalEur = (total / 1.95583).toFixed(2);

  const sendBtn = document.querySelector('.send-order-btn');
  sendBtn.disabled = true;
  sendBtn.style.opacity = '0.7';
  document.getElementById('sendOrderLabel').textContent = isBg ? 'Изпращане...' : 'Sending...';

  try {
    // 1. Send email via EmailJS
    await emailjs.send('service_c1jksyb', 'template_7cmgwao', {
      table, order: orderLines,
      total: `${total.toFixed(2)} лв. (${totalEur} €)`,
      note: note || (isBg ? 'Няма' : 'None'),
    });

    // 2. Save to Firebase Realtime Database → admin panel picks it up in real time
    const orderData = {
      id: Date.now().toString(),
      timestamp: Date.now(),
      table,
      items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
      total,
      note: note || '',
      done: false
    };
    if (window.sendOrderToFirebase) {
      await window.sendOrderToFirebase(orderData);
    }

    closeCart();
    showConfirmation();
    cart = [];
    updateCartUI();
    sendBtn.disabled = false;
    sendBtn.style.opacity = '1';
    document.getElementById('sendOrderLabel').textContent = isBg ? 'Изпрати поръчката' : 'Send Order';
    document.getElementById('tableNumber').value  = '';
    document.getElementById('cartNoteText').value = '';

  } catch(err) {
    console.error(err);
    sendBtn.disabled = false;
    sendBtn.style.opacity = '1';
    document.getElementById('sendOrderLabel').textContent = isBg ? 'Изпрати поръчката' : 'Send Order';
    alert(isBg ? 'Грешка при изпращане. Моля опитай отново.' : 'Failed to send. Please try again.');
  }
}

function showConfirmation() {
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.add('open');
  setTimeout(() => overlay.classList.remove('open'), 5000);
}

buildMenu();
</script>
