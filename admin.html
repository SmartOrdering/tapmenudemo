<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bite — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>(function(){ emailjs.init({ publicKey: "blYqsYqqNhvO7nZKA" }); })();</script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-U1e7y93fB5C5wfvmu2YU-Q9rqaR-JE8",
    authDomain: "tapmenucustomer.firebaseapp.com",
    databaseURL: "https://tapmenucustomer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tapmenucustomer",
    storageBucket: "tapmenucustomer.firebasestorage.app",
    messagingSenderId: "926437550071",
    appId: "1:926437550071:web:9863e28b98bcfbe776b0f2",
    measurementId: "G-MR3XHVY4V9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ════════════════════════════════════
  //  AUTH STATE — auto login/logout UI
  // ════════════════════════════════════
  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginPass').value = '';
      loadOrders();
      startPolling();
    } else {
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('adminWrap').style.display = 'none';
      stopPolling();
    }
  });

  // ════════════════════════════════════
  //  LOGIN / LOGOUT
  // ════════════════════════════════════
  window.doLogin = async function() {
    const email = document.getElementById('loginUser').value.trim();
    const pass  = document.getElementById('loginPass').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('loginError');

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.style.display = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  };

  window.doLogout = async function() {
    await signOut(auth);
    document.getElementById('loginUser').value = '';
  };

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') {
      window.doLogin();
    }
  });
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0806;
    --deep: #110e09;
    --surface: #18130d;
    --card: #1e1710;
    --border: #2e2318;
    --orange: #d4641a;
    --orange-light: #e8773a;
    --orange-dim: #9a4710;
    --cream: #f0e6d0;
    --cream-dim: #c8b89a;
    --text-muted: #a89070;
    --green: #4caf7d;
    --red: #c0392b;
    --radius: 8px;
  }

  body {
    background: var(--deep);
    color: var(--cream);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--deep);
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 36px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--orange);
    letter-spacing: .08em;
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .login-field {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--cream);
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color .2s;
  }
  .login-field:focus { border-color: var(--orange-dim); }
  .login-field::placeholder { color: var(--text-muted); }

  .login-btn {
    width: 100%;
    background: var(--orange);
    color: #0a0806;
    border: none;
    border-radius: var(--radius);
    padding: 13px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 4px;
    transition: background .2s, opacity .2s;
  }
  .login-btn:hover:not(:disabled) { background: var(--orange-light); }
  .login-btn:disabled { opacity: .6; cursor: default; }

  .login-error {
    color: var(--red);
    font-size: 14px;
    margin-top: 12px;
    display: none;
  }

  /* ── ADMIN DASHBOARD ── */
  .admin-wrap { display: none; min-height: 100vh; }

  .admin-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }

  .admin-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: .08em;
  }

  .admin-title span {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Crimson Text', serif;
    font-weight: 400;
    letter-spacing: .04em;
    margin-left: 8px;
  }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .badge {
    background: var(--orange);
    color: #0a0806;
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
  }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--orange-dim); color: var(--cream); }

  .admin-body { padding: 24px 16px; max-width: 800px; margin: 0 auto; }

  .orders-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-style: italic;
    font-size: 18px;
  }

  /* ── ORDER CARD ── */
  .order-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color .2s;
    animation: slideIn .3s ease;
  }
  .order-card.done { opacity: .5; }
  .order-card.new-order { border-color: var(--orange); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .order-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }

  .order-table {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--orange);
  }

  .order-time {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .order-status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--orange);
    animation: pulse 1.5s infinite;
  }
  .order-card.done .status-dot {
    background: var(--green);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  .status-label {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .order-card-body { padding: 14px 18px; }

  .order-items { margin-bottom: 12px; }

  .order-item-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 16px;
  }
  .order-item-row:last-child { border-bottom: none; }

  .order-item-name { color: var(--cream); flex: 1; }
  .order-item-qty { color: var(--text-muted); margin: 0 12px; font-size: 14px; }
  .order-item-price { color: var(--cream-dim); white-space: nowrap; font-size: 14px; }

  .order-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .order-total-label {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .order-total-value {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--cream);
  }

  .order-total-eur {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: 6px;
  }

  .order-note {
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(255,255,255,.03);
    border-left: 2px solid var(--orange-dim);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-style: italic;
    font-size: 15px;
    color: var(--cream-dim);
  }

  .order-card-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .done-btn {
    background: var(--green);
    color: #0a0806;
    border: none;
    border-radius: var(--radius);
    padding: 8px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .done-btn:hover { opacity: .85; }
  .order-card.done .done-btn { background: var(--border); color: var(--text-muted); cursor: default; }

  .delete-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .delete-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── NEW ORDER NOTIFICATION ── */
  .notif {
    position: fixed;
    top: 80px; right: 16px;
    z-index: 100;
    background: var(--orange);
    color: #0a0806;
    border-radius: 12px;
    padding: 14px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 4px 24px rgba(212,100,26,.5);
    transform: translateX(120%);
    transition: transform .3s ease;
  }
  .notif.show { transform: translateX(0); }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">TheBite≈</div>
    <div class="login-sub">Admin Panel</div>
    <input class="login-field" id="loginUser" type="email" placeholder="Email" autocomplete="email" />
    <input class="login-field" id="loginPass" type="password" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Invalid email or password</div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div>
      <div class="admin-title">TheBite≈ <span>Orders</span></div>
    </div>
    <div class="header-actions">
      <span class="badge" id="pendingBadge">0 pending</span>
      <button class="clear-btn" onclick="clearDone()">Clear done</button>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="orders-empty" id="ordersEmpty">No orders yet. Waiting...</div>
    <div id="ordersList"></div>
  </div>
</div>

<!-- ══ NOTIFICATION ══ -->
<div class="notif" id="notif">🍽️ New order received!</div>

<script>
// ════════════════════════════════════
//  ORDERS (localStorage)
// ════════════════════════════════════
let orders = [];
let pollingInterval = null;

function loadOrders() {
  const saved = localStorage.getItem('thebite_orders');
  orders = saved ? JSON.parse(saved) : [];
  renderOrders();
}

function saveOrders() {
  localStorage.setItem('thebite_orders', JSON.stringify(orders));
}

function renderOrders() {
  const list  = document.getElementById('ordersList');
  const empty = document.getElementById('ordersEmpty');
  const badge = document.getElementById('pendingBadge');

  const pending = orders.filter(o => !o.done).length;
  badge.textContent = `${pending} pending`;

  if (orders.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = '';

  const sorted = [...orders].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return b.timestamp - a.timestamp;
  });

  sorted.forEach(order => {
    const card = document.createElement('div');
    card.className = 'order-card' + (order.done ? ' done' : ' new-order');
    card.id = 'order-' + order.id;

    const time     = new Date(order.timestamp).toLocaleTimeString('bg-BG', { hour: '2-digit', minute: '2-digit' });
    const date     = new Date(order.timestamp).toLocaleDateString('bg-BG');
    const totalEur = (order.total / 1.95583).toFixed(2);

    const itemsHtml = order.items.map(item => {
      const lineTotal = item.price * item.qty;
      return `<div class="order-item-row">
        <span class="order-item-name">${item.name}</span>
        <span class="order-item-qty">x${item.qty}</span>
        <span class="order-item-price">${lineTotal.toFixed(2)} лв.</span>
      </div>`;
    }).join('');

    const noteHtml = order.note && order.note !== 'Няма' && order.note !== 'None'
      ? `<div class="order-note">📝 ${order.note}</div>` : '';

    card.innerHTML = `
      <div class="order-card-header">
        <div>
          <div class="order-table">Маса ${order.table}</div>
          <div class="order-time">${date} — ${time}</div>
        </div>
        <div class="order-status">
          <div class="status-dot"></div>
          <span class="status-label">${order.done ? 'Done' : 'Pending'}</span>
        </div>
      </div>
      <div class="order-card-body">
        <div class="order-items">${itemsHtml}</div>
        <div class="order-total-row">
          <span class="order-total-label">Total</span>
          <span class="order-total-value">${order.total.toFixed(2)} лв.<span class="order-total-eur">(${totalEur} €)</span></span>
        </div>
        ${noteHtml}
      </div>
      <div class="order-card-footer">
        <button class="delete-btn" onclick="deleteOrder('${order.id}')">Delete</button>
        <button class="done-btn" onclick="markDone('${order.id}')" ${order.done ? 'disabled' : ''}>
          ${order.done ? '✓ Done' : 'Mark as done'}
        </button>
      </div>`;

    list.appendChild(card);
  });
}

function markDone(id) {
  const order = orders.find(o => o.id === id);
  if (order) { order.done = true; saveOrders(); renderOrders(); }
}

function deleteOrder(id) {
  orders = orders.filter(o => o.id !== id);
  saveOrders();
  renderOrders();
}

function clearDone() {
  orders = orders.filter(o => !o.done);
  saveOrders();
  renderOrders();
}

// ════════════════════════════════════
//  POLLING
// ════════════════════════════════════
function startPolling() {
  pollingInterval = setInterval(() => {
    const saved = localStorage.getItem('thebite_orders');
    const fresh = saved ? JSON.parse(saved) : [];
    if (fresh.length > orders.length) {
      orders = fresh;
      renderOrders();
      showNotif();
    }
  }, 5000);
}

function stopPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
}

function showNotif() {
  const n = document.getElementById('notif');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 4000);
}

// ════════════════════════════════════
//  RECEIVE ORDER (called from menu page)
// ════════════════════════════════════
window.receiveOrder = function(orderData) {
  const saved    = localStorage.getItem('thebite_orders');
  const existing = saved ? JSON.parse(saved) : [];
  existing.unshift(orderData);
  localStorage.setItem('thebite_orders', JSON.stringify(existing));
};
</script>

</body>
</html>
